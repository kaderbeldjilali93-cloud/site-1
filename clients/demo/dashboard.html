    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                        latin: ['system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#FF9900',
                            dark: '#CC7A00',
                        },
                        ticket: {
                            header: '#374151',
                            body: '#1F2937',
                        }
                    }
                }
            }
        }

    <style>
        body { background-color: #111827; color: #fff; transition: all 0.3s ease; }
        .hidden-section { display: none; }
        iframe { border: none; width: 100%; height: 100%; }
        /* تأثير زجاجي خفيف */
        .glass {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* تنسيق التحميل */
        .loader-container {
            position: absolute;
            inset: 0;
            background: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        /* تحسين شريط التمرير */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #FF9900; }
        
        .live-indicator {
            width: 8px; height: 8px;
            background-color: #10B981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes flashYellow {
            0%, 100% { border-color: #4b5563; box-shadow: none; }
            50% { border-color: #eab308; box-shadow: 0 0 20px rgba(234, 179, 8, 0.6); }
        }
        .animate-new-order {
            animation: flashYellow 1.5s ease-in-out 4;
            border: 2px solid transparent; 
        }

        @keyframes flashGreen {
            0%, 100% { border-color: #4b5563; box-shadow: none; }
            50% { border-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.6); }
        }
        .animate-ready-order {
            animation: flashGreen 1.5s ease-in-out 4;
            border: 2px solid transparent;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* الطباعة الحرارية */
        @media print {
            @page { size: 80mm auto; margin: 0; }
            body { background-color: #fff !important; color: #000 !important; margin: 0 !important; padding: 0 !important; font-family: sans-serif !important; }
            body > *:not(#print-section) { display: none !important; }
            #print-section { display: block !important; width: 80mm !important; margin: 0 auto !important; padding: 5mm !important; font-size: 12px !important; line-height: 1.4 !important; color: #000 !important; }
        }

        /* اتجاهات الأقسام بناء على اللغة */
        html[dir="ltr"] .sidebar-text { text-align: left; }
        html[dir="rtl"] .sidebar-text { text-align: right; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="print-section" class="hidden"></div>

    <!-- ========================================== -->
    <section id="login-screen" class="flex-grow flex items-center justify-center p-4 relative">

            <div class="absolute top-0 left-0 w-64 h-64 bg-brand rounded-full mix-blend-multiply filter blur-3xl animate-pulse"></div>

        </div>

        <!-- اختيار اللغة في الدخول -->
        <div class="absolute top-5 right-5 z-20">
            <div class="relative inline-block text-right" id="lang-dropdown-login-container">
                <button onclick="toggleLangDropdown('login')" class="flex items-center gap-2 bg-gray-800 border border-gray-700 px-3 py-1.5 rounded-lg text-sm hover:bg-gray-700 transition">
                    <span id="current-lang-flag-login">🇩🇿</span>
                    <span id="current-lang-name-login">العربية</span>
                </button>
                <div id="lang-dropdown-login" class="hidden absolute left-0 mt-2 w-40 bg-gray-800 border border-gray-700 rounded-xl shadow-2xl z-50 overflow-hidden">
                    <button onclick="setLanguage('ar')" class="w-full text-right px-4 py-2 hover:bg-gray-700 transition flex items-center gap-2"><span>🇩🇿</span> العربية</button>
                    <button onclick="setLanguage('fr')" class="w-full text-right px-4 py-2 hover:bg-gray-700 transition flex items-center gap-2"><span>🇫🇷</span> Français</button>
                    <button onclick="setLanguage('en')" class="w-full text-right px-4 py-2 hover:bg-gray-700 transition flex items-center gap-2"><span>🇺🇸</span> English</button>
                </div>
            </div>
        </div>

        <div class="glass p-8 rounded-2xl shadow-2xl w-full max-w-md z-10 border-t-4 border-brand">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-extrabold text-white mb-2 tracking-wide italic">Resto<span class="text-brand">Pro</span></h1>
                <p id="t-login-subtitle" class="text-gray-400 text-sm italic">بوابة الإدارة العالمية</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label id="t-label-user" class="block text-sm font-medium text-gray-300 mb-2">اسم المطعم</label>
                    <input type="text" id="restaurantName" required class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:ring-2 focus:ring-brand focus:border-transparent outline-none transition text-white" placeholder="demo">
                </div>
                <div>
                    <label id="t-label-pass" class="block text-sm font-medium text-gray-300 mb-2">كلمة المرور</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl focus:ring-2 focus:ring-brand focus:border-transparent outline-none transition text-white" placeholder="••••••••">
                </div>
                <button type="submit" id="t-btn-login" class="w-full bg-brand hover:bg-brand-dark text-black font-extrabold py-3 rounded-xl transition transform hover:scale-[1.02] shadow-lg">تسجيل الدخول</button>
            </form>
        </div>
    </section>

    <!-- ========================================== -->
    <!-- لوحة التحكم الرئيسية -->
    <!-- ========================================== -->
    <section id="dashboard-screen" class="h-full flex flex-col hidden">

        <header class="bg-gray-900 border-b border-gray-800 h-16 flex items-center justify-between px-4 relative z-50">

            <div class="flex items-center gap-2" id="header-start-group">

                </button>
                <!-- زر جرس النادل المحدث -->

                    <span class="live-indicator !bg-red-500"></span>
                    <span id="t-waiter-btn">نداء النادل</span>
                </button>
            </div>

            <!-- اسم المطعم (في المنتصف دائماً) -->

        // =========================================================
        // 🛠️ Parsing Custom Dates (Robust Date Logic)
        // =========================================================
        function parseCustomDate(rawTime) {
            if (!rawTime) return new Date(); // If no time, treat as "now" (so it shows up)
            const timeStr = String(rawTime).trim();
            
            // Format: DD/MM/YYYY HH:mm
            if (timeStr.includes('/')) {
                const parts = timeStr.split(/[\sT]+/);
                const dPart = parts[0];
                const tPart = parts[1] || '00:00';
                
                const dParts = dPart.split('/');
                if (dParts.length === 3) {
                    const d = parseInt(dParts[0], 10);
                    const m = parseInt(dParts[1], 10) - 1; // 0-indexed month
                    let y = parseInt(dParts[2], 10);
                    if (y < 100) y += 2000;
                    
                    const tParts = tPart.split(':');
                    const h = parseInt(tParts[0], 10) || 0;
                    const min = parseInt(tParts[1], 10) || 0;
                    
                    const parsed = new Date(y, m, d, h, min);
                    if (!isNaN(parsed.getTime())) return parsed;
                }
            }
            
            // Fallback for standard formats
            const parsed = new Date(rawTime);
            return isNaN(parsed.getTime()) ? new Date() : parsed;
        }

            toast.innerHTML = `<div class="${iconColor} flex-shrink-0">${iconSvg}</div><div class="font-medium text-sm leading-snug">${message}</div>`;

        function isOrderFromToday(rawTime) {
            if (!rawTime) return true;
            try {
                const orderDate = parseCustomDate(rawTime);
                const now = new Date();
                let businessDayStart = new Date();
                businessDayStart.setHours(6, 0, 0, 0); 
                if (now.getHours() < 6) businessDayStart.setDate(businessDayStart.getDate() - 1);
                return orderDate >= businessDayStart;
            } catch (e) { return true; }
        }

        function isOrderFromSelectedDate(rawTime, dateString) {
            if (!rawTime || !dateString) return true;
            try {
                const orderDate = parseCustomDate(rawTime);
                const [year, month, day] = dateString.split('-').map(Number);
                const businessDayStart = new Date(year, month - 1, day, 6, 0, 0);
                const businessDayEnd = new Date(businessDayStart);
                businessDayEnd.setDate(businessDayEnd.getDate() + 1);
                return orderDate >= businessDayStart && orderDate < businessDayEnd;
            } catch (e) { return true; }
        }

        async function fetchWaiterCalls() {
            try {
                const response = await fetch(`https://baserow.vidsai.site/api/database/rows/table/${CALLS_TABLE_ID}/?user_field_names=true`, {
                    method: 'GET',
                    headers: { "Authorization": `Token ${BASEROW_TOKEN}` }
                });
                if (!response.ok) return;
                const data = await response.json();
                const results = data.results;

                const currentActiveCalls = [];
                const currentActiveRows = {};
                const newCallIds = [];

                results.forEach(row => {
                    let rawStatus = row.status || row.Status;
                    if (typeof rawStatus === 'object' && rawStatus !== null && rawStatus.value) rawStatus = rawStatus.value;
                    const statusVal = String(rawStatus || '').trim();

                    if (statusVal === 'قيد الانتظار') {
                        const rawTable = row.table || row.Table;
                        const tableNum = parseInt(String(rawTable || '').trim()); 
                        if (!isNaN(tableNum)) {
                            currentActiveCalls.push(tableNum);
                            currentActiveRows[tableNum] = row.id;
                            if (!STATE.activeCalls.includes(tableNum)) newCallIds.push(tableNum);
                        }
                    }
                });

                if (newCallIds.length > 0) {
                    if (!STATE.isMuted) { new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{}); }
                    newCallIds.forEach(tNum => showToast(`${t('waiter_btn')} ${t('table')} ${tNum}`, "success"));
                }

                STATE.activeCalls = currentActiveCalls;
                STATE.activeCallRows = currentActiveRows;

                const badge = document.getElementById('tables-badge');
                if (badge) {
                    if (STATE.activeCalls.length > 0) badge.classList.remove('hidden');
                    else badge.classList.add('hidden');
                }
                
                const currentTitle = document.querySelector('#dynamic-content h2');
                if (currentTitle && currentTitle.textContent.includes(t('nav_tables'))) renderTableView();

            } catch (e) {
                console.warn("Failed to fetch waiter calls (Network Error):", e.message);
            }
        }

        async function resolveTableCall(tableNum) {
            const rowId = STATE.activeCallRows[tableNum];
            if (!rowId) {
                showToast(t('error_msg'), "error");
                return;
            }

            try {
                const response = await fetch(`https://baserow.vidsai.site/api/database/rows/table/${CALLS_TABLE_ID}/${rowId}/?user_field_names=true`, {
                    method: 'PATCH',
                    headers: { 
                        "Authorization": `Token ${BASEROW_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ "status": "تمت الاستجابة" })
                });
                if (!response.ok) throw new Error("API Error");
            } catch (e) {
                console.warn("Failed to update call status on server, updating UI locally:", e.message);
            }

            STATE.activeCalls = STATE.activeCalls.filter(tNum => tNum !== tableNum);
            delete STATE.activeCallRows[tableNum];
            
            renderTableView();
            
            const badge = document.getElementById('tables-badge');
            if (badge) {
                if (STATE.activeCalls.length > 0) badge.classList.remove('hidden');
                else badge.classList.add('hidden');
            }
            
            showToast(t('success_msg'), 'success');
            fetchWaiterCalls().catch(()=>console.warn("Sync failed"));
        }

        // =========================================================
        // 🖥️ Views Rendering
        // =========================================================

        window.setKdsTab = function(tab) {
            STATE.kdsActiveTab = tab;
            renderKDS(STATE.latestKdsOrders || []);
        };

        function renderKDS(orders) {
            let filteredOrders = orders.filter(o => isOrderFromToday(o['Created at'] || o.Time || o.time || o.created_on)).reverse();
            filteredOrders = calculateDailySequence(filteredOrders);
            filteredOrders = processOrderAlerts(filteredOrders);

            dynamicContent.innerHTML = '';
            const getStatus = (o) => (typeof o.Status === 'object' && o.Status !== null) ? o.Status.value : (o.Status || o.status || 'قيد التحضير');

            const activeOrders = filteredOrders.filter(o => {
                const s = getStatus(o);
                return s === 'قيد التحضير' || s === 'جاهز';
            });

            const groups = { tables: Array.from({length: 15}, () => []), quick: [], delivery: [] };
            activeOrders.forEach(o => {
                const tableStr = o.Table || o.table || o['رقم الطاولة'] || 'سفري';
                const tableRaw = String(tableStr).toLowerCase();
                const tNum = parseInt(tableRaw.replace(/[^\d]/g, ''));
                
                if (tableRaw.includes('توصيل') || tableRaw.includes('delivery')) {
                    groups.delivery.push(o);
                } else if (!isNaN(tNum) && tNum >= 1 && tNum <= 15) {
                    groups.tables[tNum-1].push(o);
                } else {
                    groups.quick.push(o);
                }
            });

            const header = document.createElement('div');
            header.className = "flex flex-col xl:flex-row justify-between items-start xl:items-center mb-6 sticky top-0 bg-gray-800 py-4 -mx-6 -mt-6 px-6 pt-6 z-30 border-b border-gray-700 gap-4";
            
            const hasNewQuick = groups.quick.some(o => o.isNew);
            const hasNewDelivery = groups.delivery.some(o => o.isNew);
            const hasNewTable = Array.from({length: 15}, (_, i) => i + 1).some(i => groups.tables[i-1] && groups.tables[i-1].some(o => o.isNew));

            const getTabClass = (tabName, hasNew) => {
                if (STATE.kdsActiveTab === tabName) return 'bg-brand text-black shadow-md';
                if (hasNew) return 'bg-red-600 animate-pulse text-white shadow-[0_0_15px_rgba(220,38,38,0.6)]';

            header.innerHTML = `
                <div class="flex items-center gap-3">
                    <h2 class="text-2xl font-bold text-white">${t('kds_title')}</h2>
                    <span class="live-indicator"></span>
                </div>
                <div class="flex bg-gray-900 p-1 rounded-xl border border-gray-700 shadow-inner flex-wrap gap-1">
                    <button onclick="setKdsTab('tables')" class="px-5 py-2 rounded-lg text-sm font-bold transition ${getTabClass('tables', hasNewTable)}">${t('tab_tables')}</button>
                    <button onclick="setKdsTab('quick')" class="px-5 py-2 rounded-lg text-sm font-bold transition ${getTabClass('quick', hasNewQuick)} relative">${t('tab_quick')} ${groups.quick.length > 0 ? `<span class="bg-black/30 px-2 py-0.5 rounded-full ml-1.5 text-xs">${groups.quick.length}</span>` : ''}</button>
                    <button onclick="setKdsTab('delivery')" class="px-5 py-2 rounded-lg text-sm font-bold transition ${getTabClass('delivery', hasNewDelivery)} relative">${t('tab_delivery')} ${groups.delivery.length > 0 ? `<span class="bg-black/30 px-2 py-0.5 rounded-full ml-1.5 text-xs">${groups.delivery.length}</span>` : ''}</button>
                </div>
                <div class="text-gray-300 font-mono text-sm hidden xl:block">${new Date().toLocaleTimeString(STATE.currentLang === 'ar' ? 'ar-DZ' : 'en-US')}</div>
            `;
            dynamicContent.appendChild(header);

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-start pb-10";

            const renderOrderList = (ordersArray) => {
                return ordersArray.map(o => {
                    const rawTime = o['Created at'] || o.Time || o.time || o.created_on;
                    const elapsedMins = calculateElapsedMinutes(rawTime);
                    const timerStyle = getTimerStyle(elapsedMins);
                    const timerText = formatTimerText(elapsedMins);
                    const s = getStatus(o);
                    const detailsText = o.Details || o.details || o.Items || o.items || Object.values(o)[1] || '-';
                    
                    const btnHtml = s === 'قيد التحضير' 
                        ? `<button id="btn-done-${o.id}" onclick="updateOrderStatus(${o.id}, 'جاهز')" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded-lg transition shadow-md flex justify-center items-center gap-2"><span>${t('ready')}</span> ✅</button>`
                        : `<div class="text-center text-green-400 font-bold bg-green-900/30 py-2 rounded-lg border border-green-700/50">${t('ready')} (Pending Pay)</div>`;

                    return `
                    <div class="bg-gray-900 rounded-xl p-3 border border-gray-700 mb-3 last:mb-0">
                        <div class="flex justify-between items-center mb-2 border-b border-gray-700 pb-2">
                            <span class="text-xs text-gray-500 opacity-60 font-mono">${t('order')} #${o.dailySequence}</span>
                            <span class="text-sm flex items-center gap-1 transition-colors duration-300 ${timerStyle}">⏱️ ${timerText}</span>

                        <div class="text-sm text-gray-200 mb-4 leading-relaxed pl-3 border-l-2 border-brand whitespace-pre-line">${detailsText}</div>
                        ${btnHtml}
                    </div>`;
                }).join('');

            if (STATE.kdsActiveTab === 'tables') {
                for(let i = 1; i <= 15; i++) {
                    const tOrders = groups.tables[i-1];
                    const card = document.createElement('div');

                    if(tOrders.length === 0) {
                        // الحالة 1: فارغة - أخضر داكن
                        card.className = "bg-green-900/10 border-2 border-green-800/50 rounded-2xl flex flex-col items-center justify-center h-48 text-green-600/70 transition-all opacity-80";
                        card.innerHTML = `<div class="text-4xl mb-3 opacity-50">🍽️</div><div class="text-lg font-bold text-green-600">${t('table')} ${i}</div><div class="text-xs mt-1 bg-green-900/30 px-3 py-1 rounded-full border border-green-800/50">${t('table_empty')}</div>`;

                        card.className = cardClass;
                        card.innerHTML = `<div class="${headerClass} font-bold p-3 text-center text-lg flex justify-between items-center"><span>${t('table')} ${i}</span><span class="bg-black/20 text-current text-xs font-bold px-2 py-1 rounded-full border border-black/30">${tOrders.length}</span></div><div class="p-3 max-h-[400px] overflow-y-auto">${renderOrderList(tOrders)}</div>`;

                    grid.appendChild(card);
                }
            } else {
                const targetOrders = STATE.kdsActiveTab === 'quick' ? groups.quick : groups.delivery;
                const tabTitle = STATE.kdsActiveTab === 'quick' ? t('tab_quick') : t('tab_delivery');
                const themeBorder = STATE.kdsActiveTab === 'quick' ? 'border-blue-500' : 'border-purple-500';
                const themeBg = STATE.kdsActiveTab === 'quick' ? 'bg-blue-600' : 'bg-purple-600';
                
                if(targetOrders.length === 0) {
                    grid.className = "flex flex-col items-center justify-center h-64 text-gray-500 w-full col-span-full";
                    grid.innerHTML = `<div class="text-6xl mb-4 opacity-50">📋</div><div class="text-xl font-medium">${t('table_empty')}</div>`;
                } else {
                    targetOrders.forEach(o => {
                        const card = document.createElement('div');
                        const hasNew = o.isNew;
                        const s = getStatus(o);
                        const tableStr = o.Table || o.table || o['رقم الطاولة'] || 'سفري';
                        
                        let borderColorClass = s === 'قيد التحضير' 
                            ? `${themeBorder} shadow-[0_0_15px_rgba(100,100,255,0.3)]` 
                            : 'border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.3)]';

                        card.className = `bg-gray-800 border-2 ${borderColorClass} rounded-2xl flex flex-col overflow-hidden ${hasNew ? 'animate-pulse' : ''} h-full`;
                        
                        const rawTime = o['Created at'] || o.Time || o.time || o.created_on;
                        const elapsedMins = calculateElapsedMinutes(rawTime);
                        const timerStyle = getTimerStyle(elapsedMins);
                        const timerText = formatTimerText(elapsedMins);
                        const detailsText = o.Details || o.details || o.Items || o.items || Object.values(o)[1] || '-';

                        const btnHtml = s === 'قيد التحضير' 
                            ? `<button id="btn-done-${o.id}" onclick="updateOrderStatus(${o.id}, 'جاهز')" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl transition shadow-lg flex justify-center items-center gap-2 mt-auto text-lg hover:scale-[1.02]"><span>${t('ready')}</span> ✅</button>`
                            : `<div class="text-center text-yellow-400 font-bold bg-yellow-900/30 py-3 rounded-xl border border-yellow-700/50 mt-auto">${t('ready')} (Pending Pay)</div>`;

                        let ordersHTML = `
                        <div class="bg-gray-900 rounded-xl p-4 border border-gray-700 m-3 flex-1 flex flex-col shadow-inner">
                            <div class="flex justify-between items-center mb-3 border-b border-gray-700 pb-3">
                                <span class="text-sm text-gray-400 font-mono bg-gray-800 px-2 py-1 rounded">${t('order')} #${o.dailySequence}</span>
                                <span class="text-sm flex items-center gap-1 transition-colors duration-300 ${timerStyle} font-bold">⏱️ ${timerText}</span>
                            </div>
                            <div class="text-xs text-gray-400 mb-3 bg-gray-800 inline-block px-3 py-1.5 rounded-lg border border-gray-700 w-fit">Destination: <span class="text-white font-bold text-sm">${tableStr}</span></div>
                            <div class="text-base text-gray-100 mb-6 leading-relaxed pl-3 border-l-4 ${themeBorder} whitespace-pre-line flex-1">${detailsText}</div>
                            ${btnHtml}
                        </div>`;

                        const headerBg = s === 'قيد التحضير' ? themeBg : 'bg-yellow-500 text-black';
                        card.innerHTML = `<div class="${headerBg} text-white font-bold p-3 text-center text-lg flex justify-between items-center shadow-md"><span>${tabTitle}</span></div>${ordersHTML}`;
                        grid.appendChild(card);

            dynamicContent.appendChild(grid);
            dynamicContent.classList.remove('hidden');
        }

        // =========================================================
        // 💰 الكاشير (Cashier)
        // =========================================================
        window.setCashierFilter = function(status) {
            STATE.cashierStatusFilter = status;
            renderCashier(STATE.lastFetchedOrders);
        };

        function renderCashier(orders) {
            STATE.lastFetchedOrders = orders;
            const content = document.getElementById('dynamic-content');
            content.innerHTML = '';

            const getPrice = (o) => parseFloat((o.Total || o.total || o.Price || o.price || 0).toString().replace(/[^0-9.]/g, '')) || 0;
            const getStatus = (o) => (typeof o.Status === 'object' && o.Status !== null) ? o.Status.value : (o.Status || o.status || 'قيد التحضير');

            let baseOrders = orders.filter(o => {
                const time = o['Created at'] || o.Time || o.time || o.created_on;
                return isOrderFromSelectedDate(time, STATE.selectedCashierDate);
            });
            
            baseOrders = calculateDailySequence(baseOrders);
            baseOrders = processOrderAlerts(baseOrders);
            STATE.processedCashierOrders = baseOrders;

            let filteredOrders = baseOrders.filter(o => getStatus(o) === STATE.cashierStatusFilter);

            let totalSales = 0; 
            baseOrders.forEach(o => totalSales += getPrice(o));
            const avgOrderValue = baseOrders.length > 0 ? (totalSales / baseOrders.length).toFixed(2) : 0;

            const tableHeader = document.createElement('div');
            tableHeader.className = "flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sticky top-0 bg-gray-800 py-4 -mx-6 -mt-6 px-6 pt-6 z-30 border-b border-gray-700 gap-4";
            tableHeader.innerHTML = `
                <div class="flex items-center gap-3">
                    <h2 class="text-xl font-bold text-white">${t('nav_cashier')}</h2>
                    <span class="live-indicator" title="Live"></span>
                </div>
                <div class="relative flex items-center bg-gray-800 border border-gray-600 rounded-lg hover:border-brand focus-within:border-brand focus-within:ring-2 focus-within:ring-brand transition-all overflow-hidden group">
                    <div class="absolute ${STATE.currentLang === 'ar' ? 'right-3' : 'left-3'} text-brand pointer-events-none z-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <input type="date" value="${STATE.selectedCashierDate}" onchange="handleCashierDateChange(event)" class="w-full bg-transparent text-white ${STATE.currentLang === 'ar' ? 'pl-3 pr-9' : 'pr-3 pl-9'} py-1.5 outline-none text-sm cursor-pointer relative font-mono z-10" style="color-scheme: dark;">
                </div>
            `;
            content.appendChild(tableHeader);

            const kpiSection = document.createElement('div');
            kpiSection.className = "grid grid-cols-1 md:grid-cols-3 gap-6 mb-8";
            kpiSection.innerHTML = `
                <div class="bg-gray-800 p-5 rounded-xl border-l-4 border-brand shadow-lg"><p class="text-gray-400 text-sm mb-1">${t('sales_total')}</p><h3 class="text-3xl font-bold text-white">${totalSales.toLocaleString()} DA</h3></div>
                <div class="bg-gray-800 p-5 rounded-xl border-l-4 border-blue-500 shadow-lg"><p class="text-gray-400 text-sm mb-1">${t('orders_total')}</p><h3 class="text-3xl font-bold text-white">${baseOrders.length}</h3></div>
                <div class="bg-gray-800 p-5 rounded-xl border-l-4 border-green-500 shadow-lg"><p class="text-gray-400 text-sm mb-1">${t('avg_cart')}</p><h3 class="text-3xl font-bold text-white">${avgOrderValue} DA</h3></div>
            `;
            content.appendChild(kpiSection);

            const filtersContainer = document.createElement('div');
            filtersContainer.className = "flex gap-2 mb-6 overflow-x-auto pb-2 custom-scrollbar";
            const statuses = ['قيد التحضير', 'جاهز', 'مدفوع'];
            filtersContainer.innerHTML = statuses.map(status => {
                const isActive = STATE.cashierStatusFilter === status;
                const btnClass = isActive 
                    ? 'bg-brand text-black font-bold shadow-[0_0_10px_rgba(255,153,0,0.3)]' 
                    : 'bg-gray-800 text-gray-400 hover:text-white border border-gray-700 hover:border-gray-500';
                return `<button onclick="setCashierFilter('${status}')" class="px-5 py-2 rounded-xl text-sm transition whitespace-nowrap ${btnClass}">${translateStatus(status)}</button>`;
            }).join('');
            content.appendChild(filtersContainer);

            const tableWrap = document.createElement('div');
            tableWrap.className = "overflow-x-auto bg-gray-800 rounded-lg shadow border border-gray-700";
            
            let tableHTML = `<table class="w-full text-start border-collapse text-sm" style="text-align: start;">
                <thead class="bg-gray-700 text-gray-300 uppercase">
                    <tr><th class="p-4 text-start">#</th><th class="p-4 text-start">${t('table')}</th><th class="p-4 text-start w-1/3">${t('details')}</th><th class="p-4 text-start">${t('price')}</th><th class="p-4 text-center">${t('action')}</th></tr>
                </thead>
                <tbody class="divide-y divide-gray-700 text-gray-300">`;
                
            filteredOrders.forEach(order => {
                const s = getStatus(order);
                const tableStr = order.Table || order.table || order['رقم الطاولة'] || 'سفري';
                const detailsText = order.Details || order.details || order.Items || order.items || Object.values(order)[1] || '-';
                
                const statusColors = { 
                    'قيد التحضير': 'text-yellow-300 border-yellow-700 bg-yellow-900/20', 
                    'جاهز': 'text-green-300 border-green-700 bg-green-900/20', 
                    'مدفوع': 'text-blue-300 border-blue-700 bg-blue-900/20' 
                };
                const statusClass = statusColors[s] || 'text-gray-300 bg-gray-800 border-gray-600';
                
                let rowAlertClass = '';
                if (order.isNew) rowAlertClass = 'animate-new-order';
                else if (order.justReady) rowAlertClass = 'animate-ready-order';

                let actionHTML = `<span class="px-3 py-1 rounded-full text-xs border ${statusClass} inline-block">${translateStatus(s)}</span>`;
                if (s === 'جاهز') {
                    actionHTML = `<button id="btn-pay-${order.id}" onclick="handlePaymentToggle(${order.id})" class="px-4 py-1.5 rounded-full text-xs border border-brand bg-brand text-black font-bold hover:bg-brand-dark transition shadow-[0_0_10px_rgba(255,153,0,0.4)] animate-pulse hover:animate-none whitespace-nowrap">${t('checkout')}</button>`;
                }

                tableHTML += `<tr class="hover:bg-gray-750 transition duration-150 ${rowAlertClass}">
                    <td class="p-4 text-start font-mono font-bold text-white">${order.dailySequence}</td>
                    <td class="p-4 text-start font-bold">${tableStr}</td>
                    <td class="p-4 text-start text-gray-400 truncate max-w-xs">${detailsText}</td>
                    <td class="p-4 text-start font-bold text-white">${getPrice(order).toLocaleString()} DA</td>
                    <td class="p-4 text-center">${actionHTML}</td>
                </tr>`;
            });
            tableHTML += `</tbody></table>`;
            tableWrap.innerHTML = tableHTML;
            content.appendChild(tableWrap);
            content.classList.remove('hidden');
        }

        window.handleCashierDateChange = function(e) {
            STATE.selectedCashierDate = e.target.value;
            renderCashier(STATE.lastFetchedOrders);
        };

        // =========================================================
        // Checkout & Payment Logic (Optimistic UI & Printing)
        // =========================================================
        
        window.handlePaymentToggle = function(rowId) {
            const order = STATE.processedCashierOrders.find(o => o.id === rowId);
            if (!order) return;
            
            STATE.currentCheckoutOrder = order;
            
            const price = parseFloat((order.Total || order.total || order.Price || order.price || 0).toString().replace(/[^0-9.]/g, '')) || 0;
            const tableStr = order.Table || order.table || order['رقم الطاولة'] || 'سفري';
            
            document.getElementById('checkout-title').innerText = `${t('checkout')}: #${order.dailySequence} - ${tableStr}`;
            document.getElementById('checkout-amount').innerText = `${price.toLocaleString()} DA`;
            
            document.getElementById('checkout-modal').classList.remove('hidden');
        };

        window.closeCheckoutModal = function() {
            document.getElementById('checkout-modal').classList.add('hidden');
            STATE.currentCheckoutOrder = null;
        };

        window.confirmPayment = function(shouldPrint) {
            const order = STATE.currentCheckoutOrder;
            if (!order) return;
            
            closeCheckoutModal();
            processPayment(order.id, shouldPrint);
        };

        window.processPayment = async function(rowId, shouldPrint) {
            const payBtn = document.getElementById(`btn-pay-${rowId}`);
            let originalHTML = '';
            let originalClassName = '';
            
            if (payBtn) {
                originalHTML = payBtn.innerHTML;
                originalClassName = payBtn.className;
                
                payBtn.innerHTML = translateStatus('مدفوع');
                payBtn.className = 'px-3 py-1 rounded-full text-xs border border-blue-700 bg-blue-800 text-white font-bold transition shadow-lg pointer-events-none whitespace-nowrap';
            }

            const updateLocalStatus = (ordersArray) => {
                if(!ordersArray) return;
                const order = ordersArray.find(o => o.id === rowId);
                if (order) {
                    if (typeof order.Status === 'object' && order.Status !== null) order.Status.value = 'مدفوع';
                    else order.Status = 'مدفوع';
                }
            };
            updateLocalStatus(STATE.lastFetchedOrders);
            updateLocalStatus(STATE.latestKdsOrders);
            updateLocalStatus(STATE.processedCashierOrders);

            if (shouldPrint) {
                const orderToPrint = STATE.processedCashierOrders.find(o => o.id === rowId);
                if(orderToPrint) printReceipt(orderToPrint);
            }

            try {
                await fetch(`https://baserow.vidsai.site/api/database/rows/table/${ORDERS_TABLE_ID}/${rowId}/?user_field_names=true`, {
                    method: 'PATCH',
                    headers: { "Authorization": `Token ${BASEROW_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ "Status": 'مدفوع' })
                });
                
                showToast(t('success_msg'), "success");
                
                setTimeout(async () => {
                    try {
                        const currentView = localStorage.getItem(STATE.storageKeys.lastView);
                        if (currentView === 'cashier') renderCashier(STATE.lastFetchedOrders);
                        else if (currentView === 'analytics') renderAnalytics(STATE.analyticsData, 'today');
                        
                        const freshData = await fetchOrders(ORDERS_TABLE_ID);
                        STATE.latestKdsOrders = freshData;
                        STATE.lastFetchedOrders = freshData;
                    } catch (e) { console.warn(e); }
                }, 2000);

            } catch (error) {
                console.warn("API Error:", error.message);
                showToast(t('error_msg'), "error");
                
                const revertLocalStatus = (ordersArray) => {
                    if(!ordersArray) return;
                    const order = ordersArray.find(o => o.id === rowId);
                    if (order) {
                        if (typeof order.Status === 'object' && order.Status !== null) order.Status.value = 'جاهز';
                        else order.Status = 'جاهز';
                    }
                };
                revertLocalStatus(STATE.lastFetchedOrders);
                revertLocalStatus(STATE.latestKdsOrders);
                revertLocalStatus(STATE.processedCashierOrders);

                if (payBtn) {
                    payBtn.innerHTML = originalHTML;
                    payBtn.className = originalClassName;
                }
            }
        };

        window.printReceipt = function(order) {
            const printSec = document.getElementById('print-section');
            const price = parseFloat((order.Total || order.total || order.Price || order.price || 0).toString().replace(/[^0-9.]/g, '')) || 0;
            const tableStr = order.Table || order.table || order['رقم الطاولة'] || 'سفري';
            
            const rawTime = order['Created at'] || order.Time || order.time || order.created_on;
            const dateStr = parseCustomDate(rawTime).toLocaleString(STATE.currentLang === 'ar' ? 'ar-DZ' : 'en-US');
            
            const detailsText = order.Details || order.details || order.Items || order.items || Object.values(order)[1] || '-';
            const detailsList = String(detailsText).split(/[\n]/).filter(i => i.trim() !== "");
            let itemsHtml = '';
            detailsList.forEach(item => {
                const subItems = item.split('،');
                subItems.forEach(subItem => {
                    if(subItem.trim() !== '') {
                        itemsHtml += `<div style="display:flex; justify-content:space-between; margin-bottom: 6px; font-size: 11px;"><span>${subItem.trim()}</span></div>`;
                    }
                });
            });

            printSec.innerHTML = `
                <div style="text-align: center; margin-bottom: 12px;">
                    <h2 style="margin: 0; font-size: 20px; font-weight: bold;">RestoPro</h2>
                    <div style="font-size: 11px; color: #333; margin-top: 4px;">${t('receipt_header')}</div>
                </div>
                <div style="border-top: 1px dashed #000; margin: 12px 0;"></div>
                <div style="font-size: 12px; margin-bottom: 12px; line-height: 1.6;">
                    <div style="display:flex; justify-content:space-between;"><span>${t('order')}:</span> <b>#${order.dailySequence}</b></div>
                    <div style="display:flex; justify-content:space-between;"><span>${t('table')}:</span> <b>${tableStr}</b></div>
                    <div style="display:flex; justify-content:space-between;"><span>Date:</span> <span style="font-size:10px">${dateStr}</span></div>
                </div>
                <div style="border-top: 1px dashed #000; margin: 12px 0;"></div>
                <div style="margin-bottom: 12px;">
                    <div style="font-weight: bold; margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #000; padding-bottom: 4px;">${t('details')}:</div>
                    ${itemsHtml}
                </div>
                <div style="border-top: 1px dashed #000; margin: 12px 0;"></div>
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-bottom: 12px; background-color: #f0f0f0; padding: 4px;">
                    <span>TOTAL:</span>
                    <span>${price.toLocaleString()} DA</span>
                </div>
                <div style="border-top: 1px dashed #000; margin: 12px 0;"></div>
                <div style="text-align: center; font-size: 11px; margin-top: 15px; font-weight: bold;">
                    <div>${t('receipt_footer')}</div>
                </div>
            `;
            setTimeout(() => { window.print(); }, 100);
        };

        // =========================================================
        // 📊 الإحصائيات (Analytics)
        // =========================================================
        window.handleAnalyticsDateChange = function(e) {
            STATE.selectedAnalyticsDate = e.target.value;
            renderAnalytics(STATE.analyticsData, 'custom');
        };

        async function renderAnalytics(orders = STATE.analyticsData, filterType = 'today') {
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `<div class="flex h-full items-center justify-center"><div class="animate-spin rounded-full h-12 w-12 border-t-4 border-brand"></div></div>`;

            try {
                const menuItems = await fetchMenu();
                const categoryMap = {};
                menuItems.forEach(item => {
                    const itemName = (item.Name || item.name || '').toLowerCase().trim();
                    const itemCat = (typeof item.Category === 'object' && item.Category !== null) ? item.Category.value : (item.Category || '');
                    if(itemName) categoryMap[itemName] = itemCat.toLowerCase();
                });

                const getPrice = (o) => parseFloat((o.Total || o.total || o.Price || o.price || 0).toString().replace(/[^0-9.]/g, '')) || 0; 
                
                const filteredOrders = orders.filter(o => {
                    const rawTime = o['Created at'] || o.Time || o.time || o.created_on;
                    if (filterType === 'today') return isOrderFromToday(rawTime);
                    if (filterType === 'custom') return isOrderFromSelectedDate(rawTime, STATE.selectedAnalyticsDate);
                    if (filterType === 'week') { 
                        const tDate = parseCustomDate(rawTime);
                        const oneWeekAgo = new Date(); oneWeekAgo.setDate(new Date().getDate() - 7); 
                        return tDate >= oneWeekAgo; 
                    }
                    if (filterType === 'month') { 
                        const tDate = parseCustomDate(rawTime);
                        const oneMonthAgo = new Date(); oneMonthAgo.setDate(new Date().getDate() - 30); 
                        return tDate >= oneMonthAgo; 
                    }
                    return true;
                });

                const foodCounts = {};
                const drinkCounts = {};
                let totalSales = 0;
                const salesByTime = {};

                filteredOrders.forEach(order => {
                    const price = getPrice(order);
                    totalSales += price;
                    const rawTime = order['Created at'] || order.Time || order.time || order.created_on;
                    const tDate = parseCustomDate(rawTime);
                    let key = (filterType === 'today' || filterType === 'custom') ? tDate.getHours() + ":00" : tDate.getDate() + "/" + (tDate.getMonth()+1);
                    salesByTime[key] = (salesByTime[key] || 0) + price;

                    const detailsText = order.Details || order.details || order.Items || order.items || Object.values(order)[1] || '-';
                    const details = String(detailsText).split(/[,،▫\-\n]/);
                    details.forEach(itemStr => {
                        let cleanStr = itemStr.trim();
                        if (!cleanStr) return;

                        let qty = 1;
                        let name = cleanStr;

                        const startMatch = cleanStr.match(/^(\d+)\s*(?:[xX\*]|\s)\s*(.+)/);
                        const endMatch = cleanStr.match(/(.+)\s*(?:[xX\*]|\()(\d+)\)?$/);

                        if (startMatch) { qty = parseInt(startMatch[1]) || 1; name = startMatch[2].trim(); } 
                        else if (endMatch) { name = endMatch[1].trim(); qty = parseInt(endMatch[2]) || 1; }

                        name = name.replace(/^[-▫▪•\.]+\s*/, '').trim();
                        if (!name || name === 'لا توجد تفاصيل') return;

                        const lowerName = name.toLowerCase();
                        let category = categoryMap[lowerName] || '';
                        if (!category) {
                            const foundKey = Object.keys(categoryMap).find(k => lowerName.includes(k) || k.includes(lowerName));
                            if (foundKey) category = categoryMap[foundKey];
                        }
                        
                        const drinkKeywords = ['boissons', 'drinks', 'mushrubat', 'مشروبات', 'عصائر', 'pepsi', 'coca', 'water', 'jus', 'soda', 'gazouz', 'hamoud', 'rouiba', 'ramy'];
                        if (drinkKeywords.some(k => lowerName.includes(k))) drinkCounts[name] = (drinkCounts[name] || 0) + qty;
                        else foodCounts[name] = (foodCounts[name] || 0) + qty;
                    });
                });

                const topFoods = Object.entries(foodCounts).sort((a,b) => b[1] - a[1]).slice(0, 5);
                const topDrinks = Object.entries(drinkCounts).sort((a,b) => b[1] - a[1]).slice(0, 5);
                const avgOrder = filteredOrders.length ? (totalSales / filteredOrders.length).toFixed(0) : 0;

                content.innerHTML = '';
                const btnClass = (type) => `px-4 py-1.5 rounded-lg text-sm font-medium transition ${filterType === type ? 'bg-brand text-black' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`;
                const datePickerBorderClass = filterType === 'custom' ? 'border-brand ring-2 ring-brand' : 'border-gray-600 hover:border-brand focus-within:border-brand focus-within:ring-2 focus-within:ring-brand';
                
                content.innerHTML += `
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 sticky top-0 bg-gray-800 py-4 -mx-6 -mt-6 px-6 pt-6 z-30 border-b border-gray-700 gap-4">
                        <h2 class="text-2xl font-bold text-white">${t('nav_analytics')}</h2>
                        <div class="flex flex-wrap items-center gap-3">
                            <div class="flex bg-gray-900 p-1 rounded-xl border border-gray-700">
                                <button onclick="renderAnalytics(STATE.analyticsData, 'today')" class="${btnClass('today')}">Today</button>
                                <button onclick="renderAnalytics(STATE.analyticsData, 'week')" class="${btnClass('week')}">Week</button>
                                <button onclick="renderAnalytics(STATE.analyticsData, 'month')" class="${btnClass('month')}">Month</button>
                            </div>
                            <div class="relative flex items-center bg-gray-800 border ${datePickerBorderClass} rounded-xl transition-all overflow-hidden group">
                                <div class="absolute ${STATE.currentLang === 'ar' ? 'right-3' : 'left-3'} text-brand pointer-events-none z-0">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                </div>
                                <input type="date" value="${STATE.selectedAnalyticsDate}" onchange="handleAnalyticsDateChange(event)" class="w-full bg-transparent text-white ${STATE.currentLang === 'ar' ? 'pl-3 pr-9' : 'pr-3 pl-9'} py-1.5 outline-none text-sm cursor-pointer relative font-mono z-10" style="color-scheme: dark;">
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-gray-900 p-6 rounded-2xl border-l-4 border-brand shadow-xl"><p class="text-gray-400 text-sm mb-1 uppercase font-bold">${t('sales_total')}</p><h3 class="text-3xl font-black">${totalSales.toLocaleString()} DA</h3></div>
                        <div class="bg-gray-900 p-6 rounded-2xl border-l-4 border-blue-500 shadow-xl"><p class="text-gray-400 text-sm mb-1 uppercase font-bold">${t('orders_total')}</p><h3 class="text-3xl font-black">${filteredOrders.length}</h3></div>
                        <div class="bg-gray-900 p-6 rounded-2xl border-l-4 border-green-500 shadow-xl"><p class="text-gray-400 text-sm mb-1 uppercase font-bold">${t('avg_cart')}</p><h3 class="text-3xl font-black">${avgOrder} DA</h3></div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                        <div class="bg-gray-800 p-5 rounded-2xl border border-gray-700 shadow-lg flex flex-col items-center h-80"><h3 class="text-white font-bold mb-4 w-full">Food Trends</h3><div class="relative w-full h-40"><canvas id="foodChart"></canvas></div></div>
                        <div class="bg-gray-800 p-5 rounded-2xl border border-gray-700 shadow-lg flex flex-col items-center h-80"><h3 class="text-white font-bold mb-4 w-full">Drink Trends</h3><div class="relative w-full h-40"><canvas id="drinkChart"></canvas></div></div>
                        <div class="bg-gray-800 p-5 rounded-2xl border border-gray-700 shadow-lg h-80"><h3 class="text-white font-bold mb-4">Timeline</h3><div class="relative w-full h-64"><canvas id="lineChart"></canvas></div></div>
                    </div>
                `;

                const createTable = (title, items) => {
                    if (items.length === 0) return `<div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 text-center text-gray-500">No data</div>`;
                    const rows = items.map((item, index) => `<tr class="border-b border-gray-800 hover:bg-gray-800"><td class="py-3 pl-4 w-12"><span class="w-6 h-6 flex items-center justify-center bg-gray-800 text-gray-400 rounded-full text-xs font-bold">${index + 1}</span></td><td class="py-3 font-medium">${item[0]}</td><td class="py-3 pr-4 text-start font-mono text-brand" style="text-align:start;">${item[1]}</td></tr>`).join('');
                    return `<div class="bg-gray-900 rounded-2xl border border-gray-800 shadow-lg overflow-hidden"><div class="p-4 bg-gray-800"><h3 class="text-white font-bold">Top ${title}</h3></div><table class="w-full text-sm text-start" style="text-align:start;"><tbody>${rows}</tbody></table></div>`;
                };

                const tablesGrid = document.createElement('div');
                tablesGrid.className = "grid grid-cols-1 md:grid-cols-2 gap-6 pb-10";
                tablesGrid.innerHTML = createTable('Foods', topFoods) + createTable('Drinks', topDrinks);
                content.appendChild(tablesGrid);

                const commonOptions = { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: false } }, borderWidth: 0 };
                if(topFoods.length > 0) new Chart(document.getElementById('foodChart'), { type: 'doughnut', data: { labels: topFoods.map(i => i[0]), datasets: [{ data: topFoods.map(i => i[1]), backgroundColor: ['#FF9900', '#F59E0B', '#D97706', '#B45309', '#78350F'] }] }, options: commonOptions });
                if(topDrinks.length > 0) new Chart(document.getElementById('drinkChart'), { type: 'doughnut', data: { labels: topDrinks.map(i => i[0]), datasets: [{ data: topDrinks.map(i => i[1]), backgroundColor: ['#3B82F6', '#60A5FA', '#93C5FD', '#2563EB', '#1D4ED8'] }] }, options: commonOptions });

                const timeLabels = Object.keys(salesByTime).sort((a, b) => {
                    if (filterType === 'today' || filterType === 'custom') return parseInt(a) - parseInt(b);
                    const [d1, m1] = a.split('/').map(Number);
                    const [d2, m2] = b.split('/').map(Number);
                    return (m1 !== m2) ? m1 - m2 : d1 - d2;
                });
                const salesData = timeLabels.map(k => salesByTime[k]);
                const ctxLine = document.getElementById('lineChart').getContext('2d');
                const gradient = ctxLine.createLinearGradient(0, 0, 0, 300);
                gradient.addColorStop(0, 'rgba(255, 153, 0, 0.5)');
                gradient.addColorStop(1, 'rgba(255, 153, 0, 0.0)');

                if(timeLabels.length > 0) {
                    new Chart(ctxLine, { type: 'line', data: { labels: timeLabels, datasets: [{ label: 'Sales', data: salesData, borderColor: '#FF9900', backgroundColor: gradient, fill: true, tension: 0.4, pointBackgroundColor: '#111827', pointBorderColor: '#FF9900', pointBorderWidth: 2, pointRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#1f2937' }, ticks: { color: '#6b7280' }, beginAtZero: true }, x: { grid: { display: false }, ticks: { color: '#6b7280' } } }, plugins: { legend: { display: false } } } });
                }

            } catch (error) {
                console.warn("Analytics Error:", error.message);
                content.innerHTML = `<div class="text-red-400 p-10 text-center border border-red-900 rounded bg-red-900/20">Error loading data</div>`;
            }
        }

        // =========================================================
        // 🔄 التعديل والقائمة
        // =========================================================
        window.toggleAvailability = function(btn) {
            const currentStatus = btn.getAttribute('data-status');
            const newStatus = currentStatus === 'متوفر' ? 'غير متوفر' : 'متوفر';
            btn.setAttribute('data-status', newStatus);
            btn.innerText = newStatus;
            btn.className = `text-xs px-3 py-2 rounded text-white transition ${newStatus === 'متوفر' ? 'bg-green-600 hover:bg-green-700' : 'bg-red-600 hover:bg-red-700'}`;
        };

        window.saveMenuItem = function(id) {
            const priceEl = document.getElementById(`price-${id}`);
            const toggleEl = document.getElementById(`toggle-${id}`);
            if (priceEl && toggleEl) {
                const price = parseFloat(priceEl.value);
                const status = toggleEl.getAttribute('data-status');
                updateMenuItem(id, { "Price": price, "Availability": status });
            }
        };

        function renderMenuEditor(items) {
            const content = document.getElementById('dynamic-content');
            content.innerHTML = '';
            const header = document.createElement('div');
            header.className = "flex justify-between items-center mb-6 sticky top-0 bg-gray-800 py-4 -mx-6 -mt-6 px-6 pt-6 z-30 border-b border-gray-700";
            header.innerHTML = `<h2 class="text-2xl font-bold text-white">${t('nav_menu')}</h2>`;
            content.appendChild(header);

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6";

            items.forEach(item => {
                const name = item.Name || item.name || "بدون اسم";
                const price = item.Price || item.price || 0;
                const imgUrl = (item.image && item.image.length > 0) ? item.image[0].url : "https://placehold.co/400x300/374151/FFFFFF?text=No+Image";
                const category = (typeof item.Category === 'object' && item.Category !== null) ? item.Category.value : (item.Category || 'عام');
                const availObj = item.Availability || item.availability;
                const isAvailable = (typeof availObj === 'object' && availObj !== null) ? availObj.value === "متوفر" : availObj === "متوفر";
                
                const card = document.createElement('div');
                card.className = "bg-gray-800 border border-gray-700 rounded-xl overflow-hidden shadow-lg flex flex-col";
                const btnClass = isAvailable ? "bg-green-600 hover:bg-green-700" : "bg-red-600 hover:bg-red-700";
                const btnText = isAvailable ? "متوفر" : "غير متوفر";

                card.innerHTML = `
                    <div class="h-40 overflow-hidden relative"><img src="${imgUrl}" class="w-full h-full object-cover"><span class="absolute top-2 right-2 bg-black bg-opacity-70 text-white text-xs px-2 py-1 rounded">${category}</span></div>
                    <div class="p-4 flex-1 flex flex-col gap-4">
                        <div><h3 class="text-lg font-bold text-white">${name}</h3></div>
                        <div><label class="text-xs text-gray-400 block mb-1">السعر (DA)</label><input type="number" id="price-${item.id}" value="${price}" class="w-full bg-gray-900 border border-gray-600 text-white rounded px-3 py-2 focus:ring-2 focus:ring-brand outline-none"></div>
                        <div class="flex items-center justify-between"><button id="toggle-${item.id}" onclick="toggleAvailability(this)" data-status="${isAvailable ? 'متوفر' : 'غير متوفر'}" class="text-xs px-3 py-2 rounded text-white transition ${btnClass}">${btnText}</button><button id="btn-save-${item.id}" onclick="saveMenuItem(${item.id})" class="bg-brand hover:bg-brand-dark text-black font-bold px-4 py-2 rounded text-sm transition">حفظ</button></div>
                    </div>`;
                grid.appendChild(card);
            });
            content.appendChild(grid);
            content.classList.remove('hidden');
        }

        function renderTableView() {
            const content = document.getElementById('dynamic-content');
            content.innerHTML = `<div class="flex justify-between items-center mb-8 sticky top-0 bg-gray-800 py-4 -mx-6 -mt-6 px-6 pt-6 z-30 border-b border-gray-700"><div class="flex items-center gap-3"><h2 class="text-2xl font-bold text-white">${t('nav_tables')}</h2><span class="live-indicator"></span></div></div>`;
            const grid = document.createElement('div');
            grid.className = "grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6";
            for (let i = 1; i <= 15; i++) {
                const card = document.createElement('div');
                card.className = "h-40 rounded-2xl flex flex-col items-center justify-center bg-gray-800 border border-gray-700 opacity-50";
                card.innerHTML = `<div class="text-4xl mb-2">🍽️</div><div>${t('table')} ${i}</div>`;
                grid.appendChild(card);
            }
            content.appendChild(grid);
            content.classList.remove('hidden');
        }

        async function loadView(view) {
            if (window.innerWidth < 768) { 
                if(sidebar) sidebar.classList.add('translate-x-full'); 
                const overlay = document.getElementById('sidebar-overlay');
                if(overlay) overlay.classList.add('hidden'); 
            }
            if (STATE.pollingInterval) clearInterval(STATE.pollingInterval);
            localStorage.setItem(STATE.storageKeys.lastView, view);
            
            // Move updateNavStyles call out of loadView directly, call it after functions define it if needed.
            // But it's defined right here below this function. Let's just make sure it exists.
            if(typeof updateNavStyles === 'function') updateNavStyles(view);
            
            if(welcomeState) welcomeState.style.display = 'none';
            if(loader) loader.classList.remove('hidden');
            const content = document.getElementById('dynamic-content');
            if (content) content.classList.add('hidden');
            
            try {
                if (view === 'kds' || view === 'cashier') {
                    const data = await fetchOrders();
                    if (view === 'kds') { 
                        renderKDS(data); 
                        STATE.pollingInterval = setInterval(async () => renderKDS(await fetchOrders()), 10000); 
                    } else { 
                        renderCashier(data); 
                        STATE.pollingInterval = setInterval(async () => renderCashier(await fetchOrders()), 10000); 
                    }
                } else if (view === 'tables') { 
                    renderTableView(); 
                } else if (view === 'analytics') { 
                    renderAnalytics(await fetchOrders()); 
                } else if (view === 'menu') {
                    const data = await fetchMenu();
                    renderMenuEditor(data);
                }
            } catch (e) { 
                console.error(e); 
                showToast(t('error_msg'), 'error'); 
            } finally { 
                if(loader) loader.classList.add('hidden'); 
            }
        }
        
        function updateNavStyles(view) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-brand', 'text-black', 'shadow-lg'));
            const active = document.getElementById(`btn-${view}`);
            if (active) active.classList.add('bg-brand', 'text-black', 'shadow-lg');
        }
    </script>
</body>
</html>
